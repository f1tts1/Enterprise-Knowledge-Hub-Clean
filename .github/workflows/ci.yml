name: Core CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: enterprise-rag-backend/pom.xml

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: rag-ai-service/requirements-test.txt

      - name: Install Python test dependencies
        run: python -m pip install -r rag-ai-service/requirements-test.txt

      - name: Run core verification
        run: ./scripts/verify.sh

      - name: Validate Compose configuration
        run: docker compose --env-file .env.example config --quiet
